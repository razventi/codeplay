# Hugo 설정 — 개발 블로그 (Stack 테마)
baseURL = "https://razventi.github.io/dev_odyssey/"
defaultContentLanguage = "ko"
locale = "ko-KR"
title = "라즈벤티 개발 블로그"
theme = "hugo-theme-stack"

hasCJKLanguage = true
summaryLength = 30

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS"]   # 검색 인덱스(JSON)는 검색 페이지가 생성

# 분류 체계
[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  mainSections = ["posts"]
  rssFullContent = true
  description = "개발·기술 그리고 게임 한글화 작업 기록"

  [params.footer]
    since = 2026
    customText = "라즈벤티 개발 블로그"

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

  # 좌측 사이드바(프로필)
  [params.sidebar]
    compact = false
    # avatar 이미지를 넣으려면 static/img/avatar.png 두고 아래 주석 해제
    # [params.sidebar.avatar]
    #   enabled = true
    #   local = true
    #   src = "img/avatar.png"
    [params.sidebar.subtitle]
      # (subtitle 은 사이트 description 으로 표시됨)

  [params.article]
    headingAnchor = true
    math = false
    toc = true
    readingTime = true
    [params.article.license]
      enabled = false

  # 색상 — 기본을 밝게(light)
  [params.colorScheme]
    toggle = true
    default = "light"

  # 우측 위젯
  [params.widgets]
    [[params.widgets.homepage]]
      type = "search"
    [[params.widgets.homepage]]
      type = "categories"
      [params.widgets.homepage.params]
        limit = 10
    [[params.widgets.homepage]]
      type = "tag-cloud"
      [params.widgets.homepage.params]
        limit = 20
    [[params.widgets.page]]
      type = "toc"

  [params.opengraph.twitter]
    card = "summary_large_image"

  [params.comments]
    enabled = false

# 좌측 메뉴 — 소셜
[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/razventi/dev_odyssey"
  [menu.social.params]
    icon = "brand-github"

# 좌측 메뉴 — pageRef 로 지정(Stack 은 .URL 을 그대로 출력하므로 하위경로 자동 반영)
[[menu.main]]
  identifier = "home"
  name = "홈"
  pageRef = "/"
  weight = -100
  [menu.main.params]
    icon = "home"

[[menu.main]]
  identifier = "categories"
  name = "카테고리"
  pageRef = "/categories/"
  weight = -80
  [menu.main.params]
    icon = "categories"

[[menu.main]]
  identifier = "polkr"
  name = "폴리스너츠 한글화"
  pageRef = "/categories/폴리스너츠-한글화/"
  weight = -70
  [menu.main.params]
    icon = "hash"

[markup.goldmark.renderer]
  unsafe = true
