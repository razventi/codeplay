{{- $u := .Destination -}}
{{- /* 루트상대 내부 링크(/posts/ 등)는 baseURL 하위경로를 붙여 해석. 외부/프로토콜상대는 그대로. */ -}}
{{- if and (strings.HasPrefix $u "/") (not (strings.HasPrefix $u "//")) -}}
  {{- $u = strings.TrimPrefix "/" $u | relLangURL -}}
{{- end -}}
<a class="link" href="{{ $u | safeURL }}"{{ with .Title }} title="{{ . }}"{{ end }}{{ if strings.HasPrefix .Destination "http" }} target="_blank" rel="noopener"{{ end }}>{{ .Text | safeHTML }}</a>
